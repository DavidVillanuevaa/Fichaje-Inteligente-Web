<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fichaje Semanal 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="top-row">
        <p class="eyebrow" id="eyebrow"></p>
        <div class="controls-row">
          <label class="lang-switch" for="langSelect">
            <span id="langLabel"></span>
            <select id="langSelect" aria-label="Language selector">
              <option value="es">Español</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="year-switch" for="yearSelect">
            <span id="yearLabel"></span>
            <select id="yearSelect" aria-label="Calendar year selector"></select>
          </label>
        </div>
      </div>
      <h1 id="mainTitle"></h1>
      <p class="subtitle" id="subtitle"></p>
      <div class="calendar-chip" id="calendarChip"></div>
    </header>

    <section class="panel">
      <h2 id="newEntryTitle"></h2>
      <form id="entry-form" class="entry-form">
        <label>
          <span id="taskLabel"></span>
          <select id="taskSelect" name="taskSelect" required></select>
        </label>
        <label id="newTaskWrap" class="hidden">
          <span id="newTaskLabel"></span>
          <input id="newTask" name="newTask" type="text" maxlength="60" placeholder="Ej. Desarrollo API">
        </label>
        <label>
          <span id="dateLabel"></span>
          <input id="date" name="date" type="date" required>
        </label>
        <label>
          <span id="startLabel"></span>
          <input id="startTime" name="startTime" type="time" required>
        </label>
        <label>
          <span id="endLabel"></span>
          <input id="endTime" name="endTime" type="time" required>
        </label>
        <button id="submitButton" type="submit"></button>
      </form>
      <p id="form-message" class="message" aria-live="polite"></p>
    </section>

    <section class="panel">
      <h2 id="timerTitle"></h2>
      <div class="timer-grid">
        <label>
          <span id="timerTaskLabel"></span>
          <select id="timerTaskSelect" name="timerTaskSelect"></select>
        </label>
        <label id="timerNewTaskWrap" class="hidden">
          <span id="timerNewTaskLabel"></span>
          <input id="timerNewTask" name="timerNewTask" type="text" maxlength="60">
        </label>
      </div>
      <p id="timerDisplay" class="timer-display">00:00:00</p>
      <div class="timer-actions">
        <button id="timerStartBtn" type="button"></button>
        <button id="timerPauseBtn" type="button"></button>
        <button id="timerFinishBtn" type="button"></button>
        <button id="timerCancelBtn" type="button" class="btn-danger"></button>
      </div>
      <p id="timerMessage" class="message" aria-live="polite"></p>
    </section>

    <section class="panel">
      <div class="week-nav">
        <button id="prev-week" type="button"></button>
        <h2 id="week-title"></h2>
        <button id="next-week" type="button"></button>
      </div>
      <p id="week-range" class="week-range"></p>
      <div id="week-grid" class="week-grid"></div>
      <div id="entryEditor" class="entry-editor hidden">
        <h3 id="entryEditorTitle"></h3>
        <p id="entryEditorInfo" class="entry-editor-info"></p>
        <div class="entry-editor-grid">
          <label>
            <span id="entryEditorStartLabel"></span>
            <input id="entryEditorStart" type="time">
          </label>
          <label>
            <span id="entryEditorEndLabel"></span>
            <input id="entryEditorEnd" type="time">
          </label>
        </div>
        <div class="entry-editor-actions">
          <button id="entryEditorSaveBtn" type="button"></button>
          <button id="entryEditorDeleteBtn" type="button" class="btn-danger"></button>
          <button id="entryEditorCancelBtn" type="button"></button>
        </div>
        <p id="entryEditorMessage" class="message" aria-live="polite"></p>
      </div>
    </section>

    <section class="panel">
      <h2 id="summaryTitle"></h2>
      <div id="summary" class="summary"></div>
    </section>

    <section class="panel">
      <h2 id="yearTotalTitle"></h2>
      <div id="yearSummary" class="summary"></div>
    </section>

    <section class="panel">
      <h2 id="taskManagerTitle"></h2>
      <form id="task-manager-form" class="task-manager-form">
        <label>
          <span id="taskManagerInputLabel"></span>
          <input id="taskManagerInput" type="text" maxlength="60">
        </label>
        <button id="taskManagerAddBtn" type="submit"></button>
      </form>
      <p id="task-manager-message" class="message" aria-live="polite"></p>
      <div id="taskList" class="task-list"></div>
    </section>

    <section class="panel">
      <h2 id="chartTitle"></h2>
      <div id="chartEmpty" class="chart-empty"></div>
      <canvas id="taskChart" width="1000" height="380"></canvas>
    </section>
  </main>

  <template id="day-template">
    <article class="day-card">
      <h3></h3>
      <ul></ul>
      <p class="day-total"></p>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
